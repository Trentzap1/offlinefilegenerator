<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline File Generator</title>
  
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            outfit: ['Outfit', 'sans-serif'],
          },
          colors: {
            obsidian: '#0a0b10',
          }
        }
      }
    }
  </script>

  <!-- Custom CSS for specialized patterns and animations -->
  <style>
    @keyframes shimmer {
      100% {
        transform: translateX(100%);
      }
    }
    
    .animate-shimmer {
      animation: shimmer 2s infinite;
    }

    .bg-grid {
      background-size: 30px 30px;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
    }
  </style>
</head>
<body class="bg-obsidian text-slate-200 font-sans min-h-screen relative flex flex-col items-center justify-center overflow-hidden p-4">

  <!-- Grid overlay -->
  <div class="absolute inset-0 bg-grid pointer-events-none"></div>
  
  <!-- Ambient glow spots (Cyber-neon backdrop blur) -->
  <div class="absolute top-[-10%] right-[-10%] w-[300px] sm:w-[500px] h-[300px] sm:h-[500px] rounded-full bg-indigo-600/10 blur-[80px] sm:blur-[120px] pointer-events-none"></div>
  <div class="absolute bottom-[-10%] left-[-10%] w-[300px] sm:w-[500px] h-[300px] sm:h-[500px] rounded-full bg-cyan-600/10 blur-[80px] sm:blur-[120px] pointer-events-none"></div>

  <!-- Main Glassmorphic Card Container -->
  <main class="w-full max-w-lg p-8 md:p-12 rounded-[2rem] border border-white/[0.08] bg-white/[0.02] backdrop-blur-xl shadow-[0_0_80px_-15px_rgba(99,102,241,0.15)] flex flex-col items-center text-center relative z-10 transition-all duration-500 ease-in-out">
    
    <!-- Pulse badge: Security Context -->
    <div class="flex items-center gap-2 px-4 py-1.5 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs font-semibold tracking-widest uppercase mb-8">
      <span class="relative flex h-2 w-2">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
      </span>
      Airgapped Router Active
    </div>

    <!-- Title & Brand -->
    <h1 class="font-outfit text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white via-slate-100 to-slate-400 tracking-tight leading-tight mb-4">
      Offline File Generator
    </h1>
    
    <!-- Subheadline -->
    <p class="text-slate-400 font-sans text-base md:text-lg font-normal leading-relaxed mb-10 max-w-sm">
      Your private, airgapped AI assistant. No apps to download. Zero data collected. Just send a text.
    </p>

    <!-- State 1: Locked Button -->
    <div id="locked-state" class="w-full transition-all duration-300">
      <button id="reveal-btn" class="group relative w-full py-4 px-6 rounded-2xl bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-outfit font-semibold text-lg tracking-wider shadow-[0_0_30px_rgba(99,102,241,0.25)] hover:shadow-[0_0_40px_rgba(99,102,241,0.45)] transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] overflow-hidden focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-[#0a0b10]">
        <!-- Shimmer highlight -->
        <span class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-shimmer"></span>
        <span class="relative">Tap to Reveal Number</span>
      </button>
    </div>

    <!-- State 2: Unlocked Content (Initially hidden) -->
    <div id="unlocked-state" class="hidden opacity-0 w-full flex flex-col items-center scale-95 transition-all duration-500 ease-out">
      <!-- Phone Number Container -->
      <div class="w-full py-5 px-6 rounded-2xl bg-white/[0.02] border border-white/[0.05] mb-6 flex flex-col items-center justify-center">
        <span class="text-xs text-slate-500 uppercase tracking-widest font-semibold mb-2">Access line</span>
        <span class="font-outfit text-2xl md:text-3xl font-bold text-white tracking-widest font-mono">
          +61 477 830 253
        </span>
      </div>

      <!-- Action SMS Link Button -->
      <a href="sms:+61477830253" class="w-full py-4 px-6 rounded-2xl bg-gradient-to-r from-cyan-400 to-emerald-400 hover:from-cyan-300 hover:to-emerald-300 text-slate-950 font-outfit font-bold text-lg text-center tracking-wider shadow-[0_0_35px_rgba(34,211,238,0.2)] hover:shadow-[0_0_45px_rgba(34,211,238,0.35)] transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:ring-offset-2 focus:ring-offset-[#0a0b10] flex items-center justify-center gap-3">
        <!-- Message Icon -->
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
        </svg>
        Text Me Now
      </a>
    </div>

  </main>

  <!-- Footer -->
  <footer class="absolute bottom-6 text-xs text-slate-600 tracking-wider">
    &copy; 2026 Offline File Generator. All rights reserved.
  </footer>

  <!-- Vanilla JS state control -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const revealBtn = document.getElementById('reveal-btn');
      const lockedState = document.getElementById('locked-state');
      const unlockedState = document.getElementById('unlocked-state');

      revealBtn.addEventListener('click', () => {
        // Step 1: Animate button collapse and fade out
        lockedState.style.opacity = '0';
        lockedState.style.transform = 'scale(0.95)';
        
        setTimeout(() => {
          // Step 2: Remove locked state from layout
          lockedState.style.display = 'none';
          
          // Step 3: Show unlocked container
          unlockedState.classList.remove('hidden');
          
          // Force browser reflow to register the display change
          unlockedState.offsetHeight;
          
          // Step 4: Fade in and scale up the unlocked state content
          unlockedState.classList.remove('opacity-0', 'scale-95');
          unlockedState.classList.add('opacity-100', 'scale-100');
        }, 300); // sync with tailwind transition speed
      });
    });
  </script>
</body>
</html>
